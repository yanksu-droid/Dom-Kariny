<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d5c63" />
    <title>Dom Kariny</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2096%2096%22%20role%3D%22img%22%20aria-label%3D%22Dom%20Kariny%22%3E%0A%20%20%3Crect%20width%3D%2296%22%20height%3D%2296%22%20rx%3D%2220%22%20fill%3D%22%230d5c63%22%2F%3E%0A%20%20%3Cpath%20d%3D%22M20%2047%2048%2024l28%2023v29a6%206%200%200%201-6%206H26a6%206%200%200%201-6-6V47Z%22%20fill%3D%22%23ffffff%22%2F%3E%0A%20%20%3Cpath%20d%3D%22M36%2082V58a4%204%200%200%201%204-4h16a4%204%200%200%201%204%204v24%22%20fill%3D%22%23dff2ee%22%2F%3E%0A%20%20%3Cpath%20d%3D%22M30%2045h36%22%20stroke%3D%22%230d5c63%22%20stroke-width%3D%225%22%20stroke-linecap%3D%22round%22%2F%3E%0A%20%20%3Ccircle%20cx%3D%2266%22%20cy%3D%2230%22%20r%3D%227%22%20fill%3D%22%23f5b84b%22%2F%3E%0A%3C%2Fsvg%3E%0A" type="image/svg+xml" />
    <style>
:root {
  --bg: #f4f7f6;
  --surface: #ffffff;
  --surface-2: #eef6f4;
  --ink: #172026;
  --muted: #66737b;
  --line: #d7e1df;
  --primary: #0d5c63;
  --primary-2: #0f747b;
  --blue: #2563eb;
  --amber: #d97706;
  --green: #15803d;
  --danger: #b42318;
  --input: #fbfcfd;
  --shadow: 0 14px 36px rgba(23, 32, 38, 0.09);
  color-scheme: light;
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--ink);
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  min-height: 100vh;
  padding-bottom: calc(76px + env(safe-area-inset-bottom));
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
  background: rgba(244, 247, 246, 0.94);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(14px);
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.brand img {
  flex: 0 0 auto;
  border-radius: 8px;
}

.brand p {
  margin: 0;
  color: var(--muted);
  font-size: 0.76rem;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: uppercase;
}

.brand h1 {
  margin: 0;
  font-size: 1.2rem;
  line-height: 1.1;
}

.save-state {
  min-width: 74px;
  padding: 7px 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--surface);
  color: var(--muted);
  font-size: 0.82rem;
  text-align: center;
}

.top-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  min-width: 0;
}

.auth-button {
  max-width: 112px;
  min-height: 36px;
  padding: 0 11px;
  overflow: hidden;
  border: 1px solid var(--primary);
  border-radius: 999px;
  background: var(--primary);
  color: #ffffff;
  font-size: 0.82rem;
  font-weight: 800;
  text-overflow: ellipsis;
  white-space: nowrap;
}

@media (max-width: 380px) {
  .topbar {
    gap: 8px;
    padding-right: 10px;
    padding-left: 10px;
  }

  .brand {
    gap: 7px;
  }

  .brand img {
    width: 32px;
    height: 32px;
  }

  .save-state {
    min-width: 64px;
    padding-right: 7px;
    padding-left: 7px;
    font-size: 0.76rem;
  }

  .auth-button {
    max-width: 84px;
    padding-right: 8px;
    padding-left: 8px;
  }
}

.app-main {
  width: min(100%, 940px);
  margin: 0 auto;
  padding: 14px;
}

.tabbar {
  position: fixed;
  right: 0;
  bottom: 0;
  left: 0;
  z-index: 30;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 4px;
  padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
  background: rgba(255, 255, 255, 0.96);
  border-top: 1px solid var(--line);
  box-shadow: 0 -10px 30px rgba(23, 32, 38, 0.08);
  backdrop-filter: blur(14px);
}

.tab {
  display: grid;
  justify-items: center;
  gap: 3px;
  min-width: 0;
  min-height: 54px;
  padding: 7px 4px;
  border: 0;
  border-radius: 8px;
  background: transparent;
  color: var(--muted);
  font-size: 0.62rem;
  font-weight: 700;
}

.tab > span:last-child {
  max-width: 100%;
  line-height: 1.05;
  overflow-wrap: anywhere;
}

.tab.is-active {
  background: var(--surface-2);
  color: var(--primary);
}

.tab:disabled {
  cursor: default;
  opacity: 0.45;
}

.tab-icon {
  display: grid;
  width: 22px;
  height: 22px;
  place-items: center;
}

.tab-icon svg {
  width: 21px;
  height: 21px;
  stroke: currentColor;
}

.toolbar,
.summary-grid,
.settings-grid {
  display: grid;
  gap: 10px;
}

.toolbar {
  grid-template-columns: auto 1fr auto;
  align-items: center;
  margin-bottom: 12px;
}

.date-control,
.month-control,
.search-control {
  width: 100%;
  min-height: 44px;
  padding: 9px 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  color: var(--ink);
}

.icon-button,
.action-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 44px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  color: var(--ink);
  font-weight: 800;
}

.icon-button {
  width: 44px;
  padding: 0;
}

.action-button {
  padding: 0 12px;
}

.action-button.primary {
  border-color: var(--primary);
  background: var(--primary);
  color: #ffffff;
}

.action-button.danger {
  border-color: #f0c7c2;
  background: #fff6f5;
  color: var(--danger);
}

.view-title {
  margin: 0 0 12px;
}

.view-title.compact {
  margin: 4px 0 0;
}

.view-title.compact h2 {
  font-size: 1rem;
}

.view-title h2 {
  margin: 0;
  font-size: 1.35rem;
  line-height: 1.15;
}

.view-title p {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: 0.92rem;
}

.summary-grid {
  grid-template-columns: repeat(2, minmax(0, 1fr));
  margin-bottom: 12px;
}

.metric {
  min-width: 0;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
}

.metric span {
  display: block;
  color: var(--muted);
  font-size: 0.74rem;
  font-weight: 800;
  text-transform: uppercase;
}

.metric strong {
  display: block;
  margin-top: 5px;
  font-size: clamp(1rem, 6vw, 1.28rem);
  line-height: 1.15;
  overflow-wrap: anywhere;
}

.day-card,
.calendar-panel,
.list-card,
.settlement-panel,
.settings-panel {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  box-shadow: var(--shadow);
}

.day-card {
  overflow: hidden;
}

.calendar-panel {
  margin-bottom: 12px;
  padding: 12px;
}

.calendar-panel header {
  display: grid;
  grid-template-columns: 44px minmax(0, 1fr) 44px;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.calendar-panel header strong {
  text-align: center;
  text-transform: capitalize;
}

.calendar-weekdays,
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 5px;
}

.calendar-weekdays {
  margin-bottom: 5px;
  color: var(--muted);
  font-size: 0.72rem;
  font-weight: 800;
  text-align: center;
}

.calendar-day {
  display: grid;
  min-width: 0;
  aspect-ratio: 1;
  place-items: center;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #ffffff;
  color: var(--ink);
  font-weight: 800;
}

.calendar-day.muted {
  color: #a6b1b7;
  background: #f7faf9;
}

.calendar-day.work {
  border-color: var(--blue);
  background: var(--blue);
  color: #ffffff;
}

.calendar-day.settled {
  border-color: #bfe3ca;
  background: #f0f9f2;
  color: var(--green);
}

.calendar-day.work.settled {
  border-color: var(--green);
  background: #f0f9f2;
  color: var(--green);
}

.calendar-day.selected {
  outline: 3px solid #f5b84b;
  outline-offset: 1px;
}

.calendar-day span {
  line-height: 1;
}

.day-heading {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 13px 14px;
  background: var(--primary);
  color: #ffffff;
}

.day-heading strong {
  font-size: 1.02rem;
}

.day-heading span {
  color: rgba(255, 255, 255, 0.78);
  font-size: 0.88rem;
}

.form-grid {
  display: grid;
  gap: 1px;
  background: var(--line);
}

.field {
  display: grid;
  grid-template-columns: 96px minmax(0, 1fr);
  min-height: 54px;
  background: var(--surface);
}

.field label {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  background: var(--surface-2);
  color: #23343a;
  font-weight: 800;
}

.field input,
.field select,
.field textarea {
  min-width: 0;
  width: 100%;
  min-height: 54px;
  padding: 10px 12px;
  border: 0;
  border-radius: 0;
  background: var(--input);
  color: var(--ink);
}

.field textarea {
  resize: vertical;
}

.field.tall textarea {
  min-height: 92px;
}

.recipe-preview {
  padding: 12px;
  background: #f7fbff;
  border-bottom: 1px solid var(--line);
}

.recipe-name-link {
  display: inline;
  min-height: 0;
  padding: 0;
  border: 0;
  background: transparent;
  color: var(--blue);
  font-weight: 900;
  text-align: left;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.recipe-url {
  display: block;
  width: fit-content;
  margin-top: 6px;
  color: var(--muted);
  font-weight: 800;
  overflow-wrap: anywhere;
}

.recipe-url.muted {
  font-weight: 700;
}

.cleaning-preview {
  padding: 12px;
  background: #f7fbff;
  border-bottom: 1px solid var(--line);
}

.cleaning-preview-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.cleaning-preview-list {
  display: grid;
  gap: 1px;
  max-height: 190px;
  margin-top: 10px;
  overflow: auto;
  background: var(--line);
  border: 1px solid var(--line);
  border-radius: 8px;
}

.cleaning-preview-check {
  display: grid;
  grid-template-columns: 28px minmax(0, 1fr);
  gap: 8px;
  align-items: start;
  padding: 8px 10px;
  background: var(--surface);
  color: var(--ink);
  font-size: 0.9rem;
  font-weight: 700;
}

.cleaning-preview-check input {
  width: 20px;
  height: 20px;
  margin: 1px 0 0;
  accent-color: var(--primary);
}

.cleaning-preview-check.is-done {
  color: #8a969d;
  background: #f3f6f6;
}

.cleaning-preview-check.is-done span {
  text-decoration: line-through;
  text-decoration-thickness: 2px;
}

.cleaning-preview p {
  margin: 8px 0 0;
  color: var(--muted);
}

.list-card.is-focused {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(13, 92, 99, 0.12), var(--shadow);
}

.list-stack {
  display: grid;
  gap: 10px;
}

.list-card {
  padding: 12px;
}

.list-card header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
}

.list-card h3 {
  margin: 0;
  font-size: 1rem;
}

.list-card p {
  margin: 5px 0 0;
  color: var(--muted);
}

.card-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.chip {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  padding: 5px 8px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #f8fafb;
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 800;
}

.chip.good {
  border-color: #bfe3ca;
  background: #f0f9f2;
  color: var(--green);
}

.chip.warn {
  border-color: #f7d7a8;
  background: #fff8ed;
  color: var(--amber);
}

.settlement-panel,
.settings-panel,
.cleaning-panel,
.clone-panel {
  padding: 14px;
}

.settlement-panel h3,
.settings-panel h3,
.cleaning-panel h3,
.clone-panel h3 {
  margin: 0 0 12px;
  font-size: 1rem;
}

.cleaning-panel,
.clone-panel {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  box-shadow: var(--shadow);
}

.clone-panel {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-top: 12px;
}

.clone-panel p {
  margin: 0;
  color: var(--muted);
}

.cleaning-panel {
  margin-bottom: 12px;
}

.cleaning-panel > header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}

.cleaning-panel > header p {
  margin: 0;
  color: var(--muted);
}

.cleaning-groups {
  display: grid;
  gap: 10px;
}

.cleaning-group {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fbfcfd;
  overflow: hidden;
}

.cleaning-group summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 11px 12px;
  cursor: pointer;
  color: var(--ink);
  font-weight: 900;
}

.cleaning-group summary span:last-child {
  color: var(--muted);
  font-size: 0.82rem;
}

.cleaning-checks {
  display: grid;
  gap: 1px;
  background: var(--line);
}

.cleaning-check {
  display: grid;
  grid-template-columns: 28px minmax(0, 1fr);
  gap: 8px;
  align-items: start;
  padding: 11px 12px;
  background: var(--surface);
  font-weight: 700;
}

.cleaning-check input {
  width: 20px;
  height: 20px;
  margin: 1px 0 0;
  accent-color: var(--primary);
}

@media (max-width: 520px) {
  .clone-panel,
  .cleaning-panel > header {
    display: grid;
  }

  .clone-panel .card-actions,
  .cleaning-panel > header .action-button {
    width: 100%;
  }

  .clone-panel .action-button,
  .cleaning-panel > header .action-button {
    width: 100%;
  }
}

.settlement-table {
  width: 100%;
  border-collapse: collapse;
}

.settlement-table th,
.settlement-table td {
  padding: 10px 8px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  vertical-align: top;
}

.settlement-table th:last-child,
.settlement-table td:last-child {
  text-align: right;
}

.settings-grid {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.settings-field {
  display: grid;
  gap: 6px;
}

.settings-field.full {
  grid-column: 1 / -1;
}

.settings-field label {
  color: var(--muted);
  font-size: 0.82rem;
  font-weight: 800;
}

.settings-field input,
.settings-field textarea {
  width: 100%;
  min-height: 44px;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--input);
  color: var(--ink);
}

.settings-field textarea {
  min-height: 210px;
  resize: vertical;
}

.empty {
  padding: 24px 14px;
  border: 1px dashed var(--line);
  border-radius: 8px;
  background: var(--surface);
  color: var(--muted);
  text-align: center;
}

.sync-gate {
  display: grid;
  justify-items: center;
  gap: 12px;
  margin: 20px auto;
  padding: 26px 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  box-shadow: var(--shadow);
  text-align: center;
}

.sync-mark {
  display: grid;
  width: 48px;
  height: 48px;
  place-items: center;
  border-radius: 50%;
  background: var(--surface-2);
  color: var(--primary);
  font-weight: 900;
}

.sync-mark.error {
  background: #fff6f5;
  color: var(--danger);
}

.sync-gate h2 {
  margin: 0;
  font-size: 1.2rem;
}

.sync-gate p {
  max-width: 520px;
  margin: 0;
  color: var(--muted);
  line-height: 1.45;
}

.card-actions.center {
  justify-content: center;
}

.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
}

@media (min-width: 720px) {
  .app-shell {
    padding-bottom: 0;
  }

  .topbar {
    padding-right: 24px;
    padding-left: 24px;
  }

  .app-main {
    padding: 22px;
  }

  .tabbar {
    position: sticky;
    top: 68px;
    width: min(100% - 32px, 940px);
    margin: 14px auto 0;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: none;
  }

  .tab {
    font-size: 0.72rem;
  }

  .summary-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .field {
    grid-template-columns: 150px minmax(0, 1fr);
  }

  .list-stack.two-col {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

</style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <img src="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2096%2096%22%20role%3D%22img%22%20aria-label%3D%22Dom%20Kariny%22%3E%0A%20%20%3Crect%20width%3D%2296%22%20height%3D%2296%22%20rx%3D%2220%22%20fill%3D%22%230d5c63%22%2F%3E%0A%20%20%3Cpath%20d%3D%22M20%2047%2048%2024l28%2023v29a6%206%200%200%201-6%206H26a6%206%200%200%201-6-6V47Z%22%20fill%3D%22%23ffffff%22%2F%3E%0A%20%20%3Cpath%20d%3D%22M36%2082V58a4%204%200%200%201%204-4h16a4%204%200%200%201%204%204v24%22%20fill%3D%22%23dff2ee%22%2F%3E%0A%20%20%3Cpath%20d%3D%22M30%2045h36%22%20stroke%3D%22%230d5c63%22%20stroke-width%3D%225%22%20stroke-linecap%3D%22round%22%2F%3E%0A%20%20%3Ccircle%20cx%3D%2266%22%20cy%3D%2230%22%20r%3D%227%22%20fill%3D%22%23f5b84b%22%2F%3E%0A%3C%2Fsvg%3E%0A" alt="" width="36" height="36" />
        <div>
          <p>Dom</p>
          <h1>Karina</h1>
        </div>
      </div>
      <div class="top-actions">
        <button class="auth-button" id="authButton" type="button" hidden>Zaloguj</button>
        <div class="save-state" id="saveState">Łączenie</div>
      </div>
      </header>

      <nav class="tabbar" aria-label="Widoki">
        <button class="tab is-active" type="button" data-view="telefon" aria-label="Dzień">
          <span class="tab-icon" data-icon="phone"></span>

function initFirebase() {
  if (window.location.protocol === "file:") {
    sync.status = "local";
    setSaveState(currentSyncLabel(), true);
    updateAuthUi();
    render();
    return;
  }

  if (!window.firebase?.initializeApp || !window.firebase?.auth || !window.firebase?.firestore) {
    sync.status = "local";
    setSaveState(currentSyncLabel(), true);
    updateAuthUi();
    render();
    return;
  }

  try {
    window.firebase.initializeApp(firebaseConfig);
    sync.auth = window.firebase.auth();
    sync.db = window.firebase.firestore();
    sync.stateRef = sync.db.doc(FIRESTORE_STATE_PATH);
    sync.auth.setPersistence(window.firebase.auth.Auth.Persistence.LOCAL).catch(() => {});
    sync.auth.onAuthStateChanged(handleAuthUser);
  } catch (error) {
    sync.status = "syncError";
    sync.lastError = error?.message || "Nie udało się uruchomić Firebase.";
    setSaveState(currentSyncLabel(), true);
    render();
  }
}

function handleAuthUser(user) {
  if (sync.unsubscribe) {
    sync.unsubscribe();
    sync.unsubscribe = null;
  }

  sync.user = user || null;
  sync.remoteReady = false;

  if (!user) {
    sync.status = "signedOut";
    setSaveState(currentSyncLabel(), true);
    render();
    return;
  }

  sync.status = "loading";
  setSaveState(currentSyncLabel(), true);
  render();
  subscribeRemoteState();
}

function subscribeRemoteState() {
  if (!sync.stateRef) return;

  sync.unsubscribe = sync.stateRef.onSnapshot(
    (snapshot) => {
      if (!snapshot.exists) {
        sync.remoteReady = true;
        sync.status = "online";
        setSaveState("Tworzę bazę", true);
        saveState({ immediate: true });
        render();
        return;
      }

      const snapshotData = snapshot.data() || {};
      const remoteState = snapshotData.data;
      if (!remoteState) {
        sync.status = "syncError";
        sync.lastError = "Dokument Firebase nie zawiera danych aplikacji.";
        setSaveState(currentSyncLabel(), true);
        render();
        return;
      }

      if (snapshotData.updatedByClient === sync.clientId && sync.remoteReady) {
        sync.status = "online";
        setSaveState(currentSyncLabel(), true);
        return;
      }

      sync.applyingRemote = true;
      state = normalizeState(remoteState);
      storageSet(STORAGE_KEY, JSON.stringify(state));
      sync.applyingRemote = false;
      sync.remoteReady = true;
      sync.status = "online";
      setSaveState(currentSyncLabel(), true);
      render();
    },
    (error) => {
      sync.remoteReady = false;
      sync.status = error?.code === "permission-denied" ? "unauthorized" : "syncError";
      sync.lastError = error?.message || "Nie udało się połączyć z bazą.";
      setSaveState(currentSyncLabel(), true);
      render();
    },
  );
}

async function signInFirebase() {
  if (!sync.auth || !window.firebase?.auth) return;
  sync.status = "authenticating";
  setSaveState(currentSyncLabel(), true);
  render();

  const provider = new window.firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ prompt: "select_account" });
  try {
    await sync.auth.setPersistence(window.firebase.auth.Auth.Persistence.LOCAL);
    await sync.auth.signInWithPopup(provider);
  } catch (error) {
    if (["auth/popup-blocked", "auth/cancelled-popup-request", "auth/operation-not-supported-in-this-environment"].includes(error?.code)) {
      await sync.auth.signInWithRedirect(provider);
      return;
    }
    sync.status = "signedOut";
    sync.lastError = error?.message || "Nie udało się zalogować.";
    setSaveState("Błąd logowania");
    render();
  }
}

async function signOutFirebase() {
  if (!sync.auth) return;
  await sync.auth.signOut();
}

function queueRemoteSave(immediate = false) {
  if (!sync.stateRef || !sync.user || !sync.remoteReady || sync.applyingRemote) return;
  window.clearTimeout(sync.writeTimer);
  sync.status = "saving";
  setSaveState(currentSyncLabel(), true);
  if (immediate) {
    pushRemoteState();
    return;
  }
  sync.writeTimer = window.setTimeout(pushRemoteState, REMOTE_WRITE_DELAY);
}

async function pushRemoteState() {
  if (!sync.stateRef || !sync.user || sync.applyingRemote) return;
  try {
    await sync.stateRef.set(
      {
        data: normalizeState(state),
        updatedAt: window.firebase.firestore.FieldValue.serverTimestamp(),
        updatedBy: sync.user.email || "",
        updatedByClient: sync.clientId,
      },
      { merge: true },
    );
    sync.status = "online";
    setSaveState("Zapisano wspólnie");
  } catch (error) {
    sync.status = error?.code === "permission-denied" ? "unauthorized" : "syncError";
    sync.lastError = error?.message || "Nie udało się zapisać w Firebase.";
    setSaveState(currentSyncLabel(), true);
    render();
  }
}

function loadState() {
  const raw = storageGet(STORAGE_KEY);
  if (!raw) return createSeedState();
  try {
    return normalizeState(JSON.parse(raw));
  } catch {
    return createSeedState();
  }
}

function normalizeState(input) {
  const seed = createSeedState();
  const inputSettings = input.settings || {};
  const settings = { ...seed.settings, ...inputSettings };
  settings.tasks = normalizeTaskCatalog(settings.tasks || seed.settings.tasks);
  settings.cleaningCatalogVersion = CLEANING_CATALOG_VERSION;
  settings.cleaningTasks = mergeCleaningCatalog(inputSettings.cleaningTasks, inputSettings.cleaningCatalogVersion);
  const entries = (input.entries || seed.entries).map((entry) => ({
    date: entry.date,
    start: entry.start || "",
    end: entry.end || "",
    type: entry.type || "Wolne",
    status: normalizeStatus(entry.status),
    tasks: normalizeTasks(entry.tasks),
    cleaningTasks: normalizeCleaningSelection(entry.cleaningTasks || entry.cleaning || []),
    cleaningDone: normalizeCleaningDone(entry.cleaningDone || [], entry.cleaningTasks || entry.cleaning || []),
    recipeName: entry.recipeName || "",
    meal: entry.meal || "",
    shopping: entry.shopping || "",
    shoppingCost: Number(entry.shoppingCost || 0),
    notes: entry.notes || "",
  }));
  return {
    settings,
    entries,
    recipes: normalizeRecipes(input.recipes || seed.recipes),
  };
}

function normalizeTasks(tasks) {
  const out = Array.isArray(tasks) ? tasks.slice(0, 4) : [];
  while (out.length < 4) out.push("");
  return out.map((task) => task || "");
}

function normalizeTaskCatalog(tasks) {
  return [...new Set((tasks || []).map((task) => String(task || "").trim()).filter(Boolean))];
}

function normalizeCleaningSelection(tasks) {
  return [...new Set((tasks || []).map((task) => String(task || "").trim()).filter(Boolean))];
}

function normalizeCleaningDone(done, selectedTasks = []) {
  const selected = new Set(normalizeCleaningSelection(selectedTasks));
  return normalizeCleaningSelection(done).filter((task) => selected.has(task));
}

function normalizeCleaningCatalog(tasks) {
  const map = new Map();
  for (const item of tasks || []) {
    const group = typeof item === "string" ? "Inne" : String(item.group || "Inne").trim();
    const name = typeof item === "string" ? item : item.name;
    const cleanName = String(name || "").trim();
    if (!cleanName) continue;
    map.set(cleanName.toLowerCase(), { group: group || "Inne", name: cleanName });
  }
  return [...map.values()];
}

function mergeCleaningCatalog(tasks, version = 0) {
  const incoming = normalizeCleaningCatalog(tasks || []);
  if (Number(version || 0) >= CLEANING_CATALOG_VERSION) {
    return incoming.length ? incoming : normalizeCleaningCatalog(defaultCleaningTasks);
  }
  const custom = incoming.filter((task) => !legacyCleaningTaskNames.has(task.name));
  return normalizeCleaningCatalog([...defaultCleaningTasks, ...custom]);
}

function normalizeStatus(status) {
  if (status === "W trakcie") return "Potwierdzone";
  return status || "";
}

function normalizeRecipes(recipes) {
  const map = new Map();
  for (const recipe of recipes || []) {
    const name = String(recipe.name || "").trim();
    if (!name) continue;
    map.set(name.toLowerCase(), {
      name,
      ingredients: recipe.ingredients || "",
      link: recipe.link || "",
      steps: recipe.steps || "",
      notes: recipe.notes || "",
    });
  }
  return [...map.values()].sort((a, b) => a.name.localeCompare(b.name, "pl"));
}

function saveState(options = {}) {
  const saved = storageSet(STORAGE_KEY, JSON.stringify(state));
  if (!sync.applyingRemote) queueRemoteSave(Boolean(options.immediate));
  setSaveState(saved ? (sync.remoteReady ? "Synchronizuję" : "Zapisano") : "Bez zapisu");
}

function storageGet(key) {
  try {
    return window.localStorage?.getItem(key) || "";
  } catch {
    return "";
  }
}

function storageSet(key, value) {
  try {
    window.localStorage?.setItem(key, value);
    return true;
  } catch {
    return false;
  }
}

function loadClientId() {
  const existing = storageGet(CLIENT_ID_KEY);
  if (existing) return existing;
  const generated =
    window.crypto?.randomUUID?.() || `client-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
  storageSet(CLIENT_ID_KEY, generated);
  return generated;
}

function setSaveState(text, sticky = false) {
  saveStateEl.textContent = text;
  window.clearTimeout(setSaveState.timer);
  if (!sticky) {
    setSaveState.timer = window.setTimeout(() => (saveStateEl.textContent = currentSyncLabel()), 1300);
  }
}

function currentSyncLabel() {
  if (sync.status === "online") return "Wspólne";
  if (sync.status === "saving") return "Synchronizuję";
  if (sync.status === "loading") return "Ładowanie";
  if (sync.status === "authenticating") return "Logowanie";
  if (sync.status === "signedOut") return "Zaloguj";
  if (sync.status === "unauthorized") return "Brak dostępu";
  if (sync.status === "syncError") return "Błąd sync";
  if (sync.status === "local") return "Lokalnie";
  return "Łączenie";
}

function updateAuthUi() {
  if (!authButton) return;
  const localOnly = sync.status === "local";
  authButton.hidden = localOnly;
  authButton.disabled = sync.status === "starting" || sync.status === "authenticating" || sync.status === "loading";
  authButton.textContent = sync.user ? shortEmail(sync.user.email || "Google") : "Zaloguj";
  authButton.title = sync.user ? `Wyloguj ${sync.user.email || ""}` : "Zaloguj przez Google";
}

function shortEmail(email) {
  const [name] = String(email).split("@");
  return name || "Google";
}

function patchEntry(entries, date, patch) {
  const entry = entries.find((item) => item.date === date);
  if (!entry) return;
  Object.assign(entry, patch);
  entry.tasks = normalizeTasks(entry.tasks);
  entry.cleaningTasks = normalizeCleaningSelection(entry.cleaningTasks);
  entry.cleaningDone = normalizeCleaningDone(entry.cleaningDone, entry.cleaningTasks);
}

function buildDays(startDate, count) {
  const start = new Date(`${startDate}T12:00:00`);
  return Array.from({ length: count }, (_, index) => {
    const date = new Date(start);
    date.setDate(start.getDate() + index);
    return toISO(date);
  });
}

function pickInitialDate() {
  const today = todayISO();
  return state.entries.find((entry) => entry.date >= today)?.date || state.entries[0]?.date || today;
}

function render() {
  updateAuthUi();
  document.querySelectorAll(".tab").forEach((tab) => {
    tab.classList.toggle("is-active", tab.dataset.view === activeView);
    tab.disabled = isSyncGateVisible();
  });

  if (isSyncGateVisible()) {
    app.innerHTML = renderSyncGate();
    bindSyncGate();
    return;
  }

  const renderers = {
    telefon: renderTelefon,
    grafik: renderGrafik,
    menu: renderMenu,
    sprzatanie: renderSprzatanie,
    finanse: renderFinanse,
    zakupy: renderFinanse,
    rozliczenia: renderFinanse,
    ustawienia: renderUstawienia,
  };
  app.innerHTML = (renderers[activeView] || renderTelefon)();
  bindView();
}

function isSyncGateVisible() {
  return ["starting", "signedOut", "authenticating", "loading", "unauthorized", "syncError"].includes(sync.status);
}

function renderSyncGate() {
  if (sync.status === "signedOut") {
    return `
      <section class="sync-gate">
        <div class="sync-mark">G</div>
        <h2>Zaloguj się przez Google</h2>
        <p>Wspólne dane są zapisane w Firebase. Użyj konta, które dostało dostęp do aplikacji.</p>
        <button class="action-button primary" type="button" data-sign-in>Logowanie Google</button>
      </section>
    `;
  }

  if (sync.status === "unauthorized") {
    return `
      <section class="sync-gate">
        <div class="sync-mark error">!</div>
        <h2>Brak dostępu</h2>
        <p>Konto ${escapeHtml(sync.user?.email || "Google")} nie ma dostępu w regułach Firestore albo reguły nie zostały jeszcze opublikowane.</p>
        <button class="action-button" type="button" data-sign-out>Wyloguj</button>
      </section>
    `;
  }

  if (sync.status === "syncError") {
    return `
      <section class="sync-gate">
        <div class="sync-mark error">!</div>
        <h2>Nie działa połączenie z bazą</h2>
        <p>${escapeHtml(sync.lastError || "Sprawdź Firebase Authentication, Firestore i Authorized domains.")}</p>
        <div class="card-actions center">
          <button class="action-button primary" type="button" data-retry-sync>Spróbuj ponownie</button>
          ${sync.user ? '<button class="action-button" type="button" data-sign-out>Wyloguj</button>' : '<button class="action-button" type="button" data-sign-in>Logowanie Google</button>'}
        </div>
      </section>
    `;
  }

  return `
    <section class="sync-gate">
      <div class="sync-mark">...</div>
      <h2>${sync.status === "authenticating" ? "Logowanie" : "Ładowanie wspólnych danych"}</h2>
      <p>Za chwilę pokaże się aktualny grafik, menu i rozliczenia.</p>
    </section>
  `;
}

function bindSyncGate() {
  app.querySelector("[data-sign-in]")?.addEventListener("click", signInFirebase);
  app.querySelector("[data-sign-out]")?.addEventListener("click", signOutFirebase);
  app.querySelector("[data-retry-sync]")?.addEventListener("click", () => handleAuthUser(sync.user));
}

function renderCalendar(month) {
  const first = new Date(`${month}-01T12:00:00`);
  const firstWeekday = (first.getDay() + 6) % 7;
  const gridStart = new Date(first);
  gridStart.setDate(first.getDate() - firstWeekday);
  const cells = Array.from({ length: 42 }, (_, index) => {
    const date = new Date(gridStart);
    date.setDate(gridStart.getDate() + index);
    const iso = toISO(date);
    const entry = state.entries.find((item) => item.date === iso) || { date: iso, type: "Wolne", status: "" };
    const inMonth = iso.startsWith(month);
    const work = isWorkDay(entry);
    const settled = entry.status === "Rozliczone";
    const selected = iso === selectedDate;
    return `
      <button class="calendar-day ${inMonth ? "" : "muted"} ${work ? "work" : ""} ${settled ? "settled" : ""} ${selected ? "selected" : ""}" type="button" data-calendar-date="${iso}" aria-label="${escapeAttr(longDate(iso))}">
        <span>${date.getDate()}</span>
      </button>
    `;
  }).join("");

  return `
    <section class="calendar-panel">
      <header>
        <button class="icon-button" type="button" data-step-month="-1" aria-label="Poprzedni miesiąc">${arrowLeft()}</button>
        <strong>${escapeHtml(monthLabel(month))}</strong>
        <button class="icon-button" type="button" data-step-month="1" aria-label="Następny miesiąc">${arrowRight()}</button>
      </header>
      <div class="calendar-weekdays" aria-hidden="true">
        <span>Pn</span><span>Wt</span><span>Śr</span><span>Cz</span><span>Pt</span><span>So</span><span>Nd</span>
      </div>
      <div class="calendar-grid">${cells}</div>
    </section>
  `;
}

function isWorkDay(entry) {
  return entry.type && entry.type !== "Wolne" && entry.status !== "Odwołane";
}

function renderFinanse() {
  const monthEntries = state.entries.filter((entry) => entry.date.startsWith(selectedMonth));
  const shoppingEntries = monthEntries.filter(
    (entry) => entry.shopping || Number(entry.shoppingCost || 0) > 0 || entry.type.toLowerCase().includes("zakupy"),
  );
  const hourlyRate = Number(state.settings.hourlyRate || 0);
  const hours = monthEntries.reduce((sum, entry) => sum + entryHours(entry), 0);
  const workPay = hours * hourlyRate;
  const settledWorkPay = monthEntries.reduce(
    (sum, entry) => sum + (entry.status === "Rozliczone" ? entryHours(entry) * hourlyRate : 0),
    0,
  );
  const shopping = monthEntries.reduce((sum, entry) => sum + Number(entry.shoppingCost || 0), 0);
  const advance = Number(state.settings.shoppingAdvance || 0);
  const extraShopping = Math.max(shopping - advance, 0);
  const transferDue = Math.max(workPay - settledWorkPay, 0) + extraShopping;
  return `
    <section class="toolbar" aria-label="Miesiąc">
      <button class="icon-button" type="button" data-step-month="-1" aria-label="Poprzedni miesiąc">${arrowLeft()}</button>
      <input class="month-control" type="month" value="${escapeAttr(selectedMonth)}" data-month-picker />
      <button class="icon-button" type="button" data-step-month="1" aria-label="Następny miesiąc">${arrowRight()}</button>
    </section>
    ${renderSummary([
      ["Godziny", formatHours(hours)],
      ["Praca", money(workPay)],
      ["Zakupy", money(shopping)],
      ["Razem", money(transferDue)],
    ])}
    <section class="settlement-panel">
      <h3>Kwoty i zakupy</h3>
      <table class="settlement-table">
        <tbody>
          <tr><td>Stawka</td><td>${money(state.settings.hourlyRate)} / h</td></tr>
          <tr><td>Koszt pracy</td><td>${money(workPay)}</td></tr>
          <tr><td>Rozliczone dni</td><td>${settledWorkPay ? `-${money(settledWorkPay)}` : money(0)}</td></tr>
          <tr><td>Zaliczka zakupowa</td><td>${money(advance)}</td></tr>
          <tr><td>Wydano z zaliczki</td><td>${money(shopping)}</td></tr>
          <tr><td>Pozostało z zaliczki</td><td>${money(Math.max(advance - shopping, 0))}</td></tr>
          <tr><td>Dopłata za zakupy</td><td>${money(extraShopping)}</td></tr>
          <tr><th>Do przekazania</th><th>${money(transferDue)}</th></tr>
        </tbody>
      </table>

          ? shoppingEntries.map(renderShoppingCard).join("")
          : '<div class="empty">Brak zakupów w tym miesiącu</div>'
      }
    </section>
  `;
}

function bindView() {
  app.querySelectorAll("[data-step-day]").forEach((button) => {
    button.addEventListener("click", () => {
      selectedDate = shiftDate(selectedDate, Number(button.dataset.stepDay));
      selectedMonth = selectedDate.slice(0, 7);
      ensureEntry(selectedDate);
      render();
    });
  });

  app.querySelectorAll("[data-step-month]").forEach((button) => {
    button.addEventListener("click", () => {
      selectedMonth = shiftMonth(selectedMonth, Number(button.dataset.stepMonth));
      if (activeView === "telefon" && !selectedDate.startsWith(selectedMonth)) selectedDate = `${selectedMonth}-01`;
      ensureEntry(selectedDate);
      render();
    });
  });

  app.querySelector("[data-date-picker]")?.addEventListener("change", (event) => {
    selectedDate = event.target.value;
    selectedMonth = selectedDate.slice(0, 7);
    ensureEntry(selectedDate);
    render();
  });

  app.querySelector("[data-month-picker]")?.addEventListener("change", (event) => {
    selectedMonth = event.target.value;
    render();
  });

  app.querySelectorAll("[data-calendar-date]").forEach((button) => {
    button.addEventListener("click", () => {
      selectedDate = button.dataset.calendarDate;
      selectedMonth = selectedDate.slice(0, 7);
      ensureEntry(selectedDate);
      render();
    });
  });

  app.querySelectorAll("[data-field]").forEach((field) => {
    field.addEventListener("input", updateEntryFromField);
    field.addEventListener("change", updateEntryFromField);
  });

  bindEditButtons(app);
  bindRecipeButtons(app);
  bindCleaningControls(app);
  bindCloneControls(app);

  app.querySelector("[data-search]")?.addEventListener("input", (event) => {
    const list = app.querySelector('[data-list="schedule"]');
    list.innerHTML = renderScheduleList(state.entries, event.target.value);
    bindEditButtons(list);
  });

  app.querySelector("[data-clear-search]")?.addEventListener("click", () => {
    const search = app.querySelector("[data-search]");
    search.value = "";
    app.querySelector('[data-list="schedule"]').innerHTML = renderScheduleList(state.entries);
    bindEditButtons(app.querySelector('[data-list="schedule"]'));
  });

  app.querySelector("[data-jump-today]")?.addEventListener("click", () => {
    selectedDate = pickInitialDate();
    selectedMonth = selectedDate.slice(0, 7);
    activeView = "telefon";
    render();
  });

  app.querySelectorAll("[data-setting]").forEach((field) => {
    field.addEventListener("change", updateSettingFromField);
    field.addEventListener("input", updateSettingFromField);
  });

  app.querySelector("[data-export-json]")?.addEventListener("click", exportJson);
  app.querySelector("[data-export-csv]")?.addEventListener("click", exportCsv);
  app.querySelector("[data-import-json]")?.addEventListener("click", () => importFile.click());
  app.querySelector("[data-reset]")?.addEventListener("click", resetData);
}

function bindEditButtons(root) {
  root.querySelectorAll("[data-edit-date]").forEach((button) => {
    button.addEventListener("click", () => {
      selectedDate = button.dataset.editDate;
      selectedMonth = selectedDate.slice(0, 7);
      activeView = "telefon";
      render();
    });
  });
}

function bindRecipeButtons(root) {
  root.querySelectorAll("[data-open-recipe-menu]").forEach((button) => {
    button.addEventListener("click", () => {
      focusedRecipeName = button.dataset.openRecipeMenu || "";
      activeView = "menu";
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });
  root.querySelector("[data-save-recipe]")?.addEventListener("click", saveRecipeFromForm);
  root.querySelector("[data-fill-recipe]")?.addEventListener("click", fillRecipeFormFromName);
  root.querySelectorAll("[data-use-recipe]").forEach((button) => {
    button.addEventListener("click", () => {
      const entry = getEntry(selectedDate);
      const recipe = findRecipe(button.dataset.useRecipe);
      entry.recipeName = recipe?.name || "";
      if (recipe && (!entry.meal || entry.meal === "Według zakładki Menu")) entry.meal = recipe.name;
      saveState();
      activeView = "telefon";
      render();
    });
  });
  root.querySelectorAll("[data-edit-recipe]").forEach((button) => {
    button.addEventListener("click", () => {
      focusedRecipeName = button.dataset.editRecipe || "";
      fillRecipeForm(button.dataset.editRecipe);
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });
}

function bindCleaningControls(root) {
  root.querySelector("[data-open-cleaning]")?.addEventListener("click", () => {
    activeView = "sprzatanie";
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  root.querySelectorAll("[data-cleaning-task]").forEach((checkbox) => {
    checkbox.addEventListener("change", () => {
      const entry = getEntry(selectedDate);
      const tasks = new Set(normalizeCleaningSelection(entry.cleaningTasks || []));
      const task = checkbox.dataset.cleaningTask || "";
      if (checkbox.checked) {
        tasks.add(task);
      } else {
        tasks.delete(task);
      }
      entry.cleaningTasks = [...tasks].sort((a, b) => a.localeCompare(b, "pl"));
      entry.cleaningDone = normalizeCleaningDone(entry.cleaningDone, entry.cleaningTasks);
      saveState();
      render();
    });
  });

  root.querySelectorAll("[data-cleaning-done]").forEach((checkbox) => {
    checkbox.addEventListener("change", () => {
      const entry = getEntry(selectedDate);
      const done = new Set(normalizeCleaningDone(entry.cleaningDone || [], entry.cleaningTasks || []));
      const task = checkbox.dataset.cleaningDone || "";
      if (checkbox.checked) {
        done.add(task);
      } else {
        done.delete(task);
      }
      entry.cleaningDone = normalizeCleaningDone([...done], entry.cleaningTasks || []);
      saveState();
      render();
    });
  });

  root.querySelector("[data-clear-cleaning]")?.addEventListener("click", () => {
    const entry = getEntry(selectedDate);
    entry.cleaningTasks = [];
    entry.cleaningDone = [];
    saveState();
    render();
  });

  root.querySelector("[data-add-cleaning-task]")?.addEventListener("click", addCleaningTaskFromForm);
}

function bindCloneControls(root) {
  root.querySelector("[data-copy-day]")?.addEventListener("click", () => {
    dayClone = {
      sourceDate: selectedDate,
      data: copyEntryData(getEntry(selectedDate)),
    };
    storageSet(DAY_CLONE_KEY, JSON.stringify(dayClone));
    setSaveState("Skopiowano dzień");
    render();
  });

  root.querySelector("[data-paste-day]")?.addEventListener("click", () => {
    if (!dayClone?.data) return;
    const sourceLabel = dayClone.sourceDate ? longDate(dayClone.sourceDate) : "skopiowany";
    if (!window.confirm(`Wkleić dzień ${sourceLabel} do ${longDate(selectedDate)}?`)) return;
    const entry = getEntry(selectedDate);
    Object.assign(entry, copyEntryData(dayClone.data));
    entry.date = selectedDate;
    entry.tasks = normalizeTasks(entry.tasks);
    entry.cleaningTasks = normalizeCleaningSelection(entry.cleaningTasks);
    entry.cleaningDone = normalizeCleaningDone(entry.cleaningDone, entry.cleaningTasks);
    saveState({ immediate: true });
    render();
  });
}

function updateEntryFromField(event) {
  const entry = getEntry(selectedDate);
  const field = event.target.dataset.field;
  const shouldRenderAfterSave = event.type === "change" && (field === "type" || field.startsWith("task-"));
  if (field.startsWith("task-")) {
    entry.tasks[Number(field.split("-")[1])] = event.target.value;
  } else if (field === "shoppingCost") {
    entry.shoppingCost = Number(event.target.value || 0);
  } else if (field === "recipeName") {
    entry.recipeName = event.target.value;
    const recipe = findRecipe(entry.recipeName);
    if (recipe && (!entry.meal || entry.meal === "Według zakładki Menu")) entry.meal = recipe.name;
    saveState();
    render();
    return;
  } else {
    entry[field] = event.target.value;
  }
  saveState();
  if (shouldRenderAfterSave) render();
}

function updateSettingFromField(event) {
  const setting = event.target.dataset.setting;
  if (setting === "tasksText") {
    state.settings.tasks = event.target.value
      .split(/\r?\n/)
      .map((item) => item.trim())
      .filter(Boolean);
  } else {
    state.settings[setting] = Number(event.target.value || 0);
  }
  saveState();
}

function saveRecipeFromForm() {
  const recipe = readRecipeForm();
  if (!recipe.name) {
    setSaveState("Brak nazwy");
    return;
  }
  const existing = state.recipes.find((item) => item.name.toLowerCase() === recipe.name.toLowerCase());
  if (existing) {
    Object.assign(existing, recipe);
  } else {
    state.recipes.push(recipe);
  }
  state.recipes = normalizeRecipes(state.recipes);
  focusedRecipeName = recipe.name;
  saveState();
  render();
}

function readRecipeForm() {
  const get = (name) => app.querySelector(`[data-new-recipe="${name}"]`)?.value.trim() || "";
  return {
    name: get("name"),
    ingredients: get("ingredients"),
    link: get("link"),
    steps: get("steps"),
    notes: get("notes"),
  };
}

function fillRecipeFormFromName() {
  const name = app.querySelector('[data-new-recipe="name"]')?.value || "";
  fillRecipeForm(name);
}

function fillRecipeForm(name) {
  const recipe = findRecipe(name);
  if (!recipe) return;
  app.querySelector('[data-new-recipe="name"]').value = recipe.name;
  app.querySelector('[data-new-recipe="ingredients"]').value = recipe.ingredients;
  app.querySelector('[data-new-recipe="link"]').value = recipe.link || "";
  app.querySelector('[data-new-recipe="steps"]').value = recipe.steps;
  app.querySelector('[data-new-recipe="notes"]').value = recipe.notes;
}

function resetData() {
  const target = sync.remoteReady ? "wspólne dane dla wszystkich" : "dane zapisane w tej przeglądarce";
  if (!window.confirm(`Usunąć ${target}?`)) return;
  state = createSeedState();
  selectedDate = pickInitialDate();
  selectedMonth = selectedDate.slice(0, 7);
  saveState({ immediate: true });
  render();
}

function renderScheduleList(entries, query = "") {
  const needle = query.trim().toLowerCase();
  const filtered = entries.filter((entry) => {
    if (!needle) return true;
    return [
      longDate(entry.date),
      dayName(entry.date),
      entry.type,
      entry.status,
      entry.tasks.join(" "),
      (entry.cleaningTasks || []).join(" "),
      (entry.cleaningDone || []).join(" "),
      entry.recipeName,
      entry.meal,
      entry.shopping,
      entry.notes,
    ]
      .join(" ")
      .toLowerCase()
      .includes(needle);
  });
  if (!filtered.length) return '<div class="empty">Brak wyników</div>';
  return filtered.slice(0, 70).map(renderScheduleCard).join("");
}

function renderScheduleCard(entry) {
  const totals = entryTotals(entry);
  const tasks = entry.tasks.filter(Boolean);
  const cleaning = normalizeCleaningSelection(entry.cleaningTasks || []);
  const cleaningDone = normalizeCleaningDone(entry.cleaningDone || [], cleaning);
  return `
    <article class="list-card">
      <header>
        <div>
          <h3>${escapeHtml(longDate(entry.date))}</h3>
          <p>${escapeHtml(dayName(entry.date))} · ${escapeHtml(entry.type || "Brak")}</p>
        </div>
        <span class="chip ${entry.status === "Plan" ? "warn" : entry.status ? "good" : ""}">${escapeHtml(entry.status || "Brak")}</span>
      </header>
      <div class="chip-row">
        <span class="chip">${formatHours(totals.hours)}</span>
        <span class="chip">${money(totals.workPay)}</span>
        ${entry.start && entry.end ? `<span class="chip">${escapeHtml(entry.start)}-${escapeHtml(entry.end)}</span>` : ""}
        ${entry.recipeName ? `<span class="chip">${escapeHtml(entry.recipeName)}</span>` : ""}
        ${cleaning.length ? `<span class="chip">${cleaningDone.length}/${cleaning.length} sprząt.</span>` : ""}
      </div>
      ${tasks.length ? `<p>${escapeHtml(tasks.join(", "))}</p>` : ""}
      ${cleaning.length ? `<p><strong>Sprzątanie:</strong> ${escapeHtml(cleaning.slice(0, 8).join(", "))}${cleaning.length > 8 ? "..." : ""}</p>` : ""}
      ${entry.meal ? `<p>${escapeHtml(entry.meal)}</p>` : ""}
      <div class="card-actions">
        <button class="action-button" type="button" data-edit-date="${escapeAttr(entry.date)}">Edytuj</button>
      </div>
    </article>
  `;
}

function renderShoppingCard(entry) {
  return `
    <article class="list-card">
      <header>
        <div>
          <h3>${escapeHtml(longDate(entry.date))}</h3>
          <p>${escapeHtml(entry.type || "Brak")}</p>
        </div>
        <span class="chip">${money(entry.shoppingCost || 0)}</span>
      </header>
      ${entry.shopping ? `<p>${escapeHtml(entry.shopping)}</p>` : ""}
      ${entry.meal ? `<p>${escapeHtml(entry.meal)}</p>` : ""}
      <div class="card-actions">
        <button class="action-button" type="button" data-edit-date="${escapeAttr(entry.date)}">Edytuj</button>
      </div>
    </article>
  `;
}

function renderSummary(items) {
  return `
    <section class="summary-grid">
      ${items
        .map(
          ([label, value]) => `
            <div class="metric">
              <span>${escapeHtml(label)}</span>
              <strong>${value}</strong>
            </div>
          `,
        )
        .join("")}
    </section>
  `;
}

function inputField(label, field, value, type = "text", step = "") {
  return `
    <div class="field">
      <label for="${field}">${escapeHtml(label)}</label>
      <input id="${field}" type="${type}" ${step ? `step="${step}"` : ""} value="${escapeAttr(value)}" data-field="${field}" />
    </div>
  `;
}

function textareaField(label, field, value, tall = false) {
  return `
    <div class="field ${tall ? "tall" : ""}">
      <label for="${field}">${escapeHtml(label)}</label>
      <textarea id="${field}" data-field="${field}">${escapeHtml(value)}</textarea>
    </div>
  `;
}

function selectField(label, field, value, options) {
  const normalized = options.includes(value) ? options : [value, ...options];
  return `
    <div class="field">
      <label for="${field}">${escapeHtml(label)}</label>
      <select id="${field}" data-field="${field}">
        ${normalized
          .map(
            (option) =>
              `<option value="${escapeAttr(option)}" ${option === value ? "selected" : ""}>${escapeHtml(option || "Brak")}</option>`,
          )
          .join("")}
      </select>
    </div>
  `;
}

function getEntry(date) {
  return ensureEntry(date);
}

function ensureEntry(date) {
  let entry = state.entries.find((item) => item.date === date);
  if (!entry) {
    entry = {
      date,
      start: "",
      end: "",
      type: "Wolne",
      status: "",
      tasks: ["", "", "", ""],
      cleaningTasks: [],
      cleaningDone: [],
      recipeName: "",
      meal: "",
      shopping: "",
      shoppingCost: 0,
      notes: "",
    };
    state.entries.push(entry);
    state.entries.sort((a, b) => a.date.localeCompare(b.date));
    saveState();
  }
  return entry;
}

function findRecipe(name) {
  if (!name) return null;
  return state.recipes.find((recipe) => recipe.name.toLowerCase() === String(name).toLowerCase()) || null;
}

function safeRecipeUrl(value) {
  const text = String(value || "").trim();
  if (!text) return "";
  const withProtocol = /^https?:\/\//i.test(text) ? text : `https://${text}`;
  try {
    const url = new URL(withProtocol);
    return ["http:", "https:"].includes(url.protocol) ? url.href : "";
  } catch {
    return "";
  }
}

function groupCleaningTasks(tasks) {
  const groups = new Map();
  for (const task of normalizeCleaningCatalog(tasks || [])) {
    if (!groups.has(task.group)) groups.set(task.group, []);
    groups.get(task.group).push(task);
  }
  return [...groups.entries()];
}

function isCleaningPlanned(entry) {
  const haystack = [entry.type, ...(entry.tasks || [])].join(" ").toLowerCase();
  return haystack.includes("sprząt");
}

function addCleaningTaskFromForm() {
  const group = app.querySelector('[data-new-cleaning="group"]')?.value.trim() || "Inne";
  const name = app.querySelector('[data-new-cleaning="name"]')?.value.trim() || "";
  if (!name) {
    setSaveState("Brak czynności");
    return;
  }
  state.settings.cleaningTasks = normalizeCleaningCatalog([...(state.settings.cleaningTasks || []), { group, name }]);
  const entry = getEntry(selectedDate);
  entry.cleaningTasks = normalizeCleaningSelection([...(entry.cleaningTasks || []), name]);
  entry.cleaningDone = normalizeCleaningDone(entry.cleaningDone, entry.cleaningTasks);
  saveState();
  render();
}

function loadDayClone() {
  const raw = storageGet(DAY_CLONE_KEY);
  if (!raw) return null;
  try {
    const parsed = JSON.parse(raw);
    if (!parsed?.data) return null;
    return {
      sourceDate: parsed.sourceDate || "",
      data: copyEntryData(parsed.data),
    };
  } catch {
    return null;
  }
}

function copyEntryData(entry) {
  return {
    start: entry.start || "",
    end: entry.end || "",
    type: entry.type || "Wolne",
    status: normalizeStatus(entry.status),
    tasks: normalizeTasks(entry.tasks),
    cleaningTasks: normalizeCleaningSelection(entry.cleaningTasks || []),
    cleaningDone: normalizeCleaningDone(entry.cleaningDone || [], entry.cleaningTasks || []),
    recipeName: entry.recipeName || "",
    meal: entry.meal || "",
    shopping: entry.shopping || "",
    shoppingCost: Number(entry.shoppingCost || 0),
    notes: entry.notes || "",
  };
}

function entryTotals(entry) {
  const hours = entryHours(entry);
  return {
    hours,
    workPay: hours * Number(state.settings.hourlyRate || 0),
  };
}

function entryHours(entry) {
  if (entry.status === "Odwołane") return 0;
  const start = parseTime(entry.start);
  const end = parseTime(entry.end);
  if (start === null || end === null || end <= start) return 0;
  return Math.round((end - start) * 100) / 100;
}

function parseTime(value) {
  if (!value || !/^\d{2}:\d{2}$/.test(value)) return null;
  const [hours, minutes] = value.split(":").map(Number);
  return hours + minutes / 60;
}

function nextPlannedDate() {
  const today = todayISO();
  const next = state.entries.find((entry) => entry.date >= today && entryHours(entry) > 0);
  return next ? longDate(next.date) : "";
}

function shiftDate(date, days) {
  const value = new Date(`${date}T12:00:00`);
  value.setDate(value.getDate() + days);
  return toISO(value);
}

function shiftMonth(month, delta) {
  const value = new Date(`${month}-01T12:00:00`);
  value.setMonth(value.getMonth() + delta);
  return `${value.getFullYear()}-${String(value.getMonth() + 1).padStart(2, "0")}`;
}

function todayISO() {
  return toISO(new Date());
}

function toISO(date) {
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
}

function longDate(date) {
  return new Intl.DateTimeFormat("pl-PL", { day: "2-digit", month: "2-digit", year: "numeric" }).format(
    new Date(`${date}T12:00:00`),
  );
}

function dayName(date) {
  return new Intl.DateTimeFormat("pl-PL", { weekday: "long" }).format(new Date(`${date}T12:00:00`));
}

function monthLabel(month) {
  return new Intl.DateTimeFormat("pl-PL", { month: "long", year: "numeric" }).format(
    new Date(`${month}-01T12:00:00`),
  );
}

function formatHours(value) {
  return `${Number(value || 0).toFixed(1)} h`;
}

function money(value) {
  return new Intl.NumberFormat("pl-PL", { style: "currency", currency: "PLN" }).format(Number(value || 0));
}

function exportJson() {
  download(`karina-dom-${todayISO()}.json`, JSON.stringify(state, null, 2), "application/json");
}

function exportCsv() {
  const header = [
    "Data",
    "Od",
    "Do",
    "Godziny",
    "Typ",
    "Status",
    "Zadania",
    "Sprzątanie",
    "Sprzątanie zrobione",
    "Przepis",
    "Obiad",
    "Zakupy",
    "Koszt zakupów",
    "Notatki",
  ];
  const rows = state.entries.map((entry) => [
    entry.date,
    entry.start,
    entry.end,
    entryHours(entry).toFixed(2),
    entry.type,
    entry.status,
    entry.tasks.filter(Boolean).join(" | "),
    (entry.cleaningTasks || []).filter(Boolean).join(" | "),
    (entry.cleaningDone || []).filter(Boolean).join(" | "),
    entry.recipeName,
    entry.meal,
    entry.shopping,
    Number(entry.shoppingCost || 0).toFixed(2),
    entry.notes,
  ]);
  const csv = [header, ...rows].map((row) => row.map(csvCell).join(",")).join("\n");
  download(`karina-grafik-${todayISO()}.csv`, csv, "text/csv;charset=utf-8");
}

function csvCell(value) {
  const text = String(value ?? "");
  return `"${text.replaceAll('"', '""')}"`;
}

function download(filename, text, type) {
  const blob = new Blob([text], { type });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  document.body.append(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

function arrowLeft() {
  return '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>';
}

function arrowRight() {
  return '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>';
}

function xIcon() {
  return '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>';
}

function calendarMini() {
